# Environment setup - Defines the environment 
env=qa
# Base URL and path for the QA environment
qa.base.url=https://petstore.swagger.io
qa.base.path=/v2
# Path to the pet payload used for creating or updating pets
payloads.pet.payload=payloads/payload.json
# Maximum acceptable response time (in milliseconds)
max.response.time=5000
# Authentication details for API requests
auth.api.key=dummykey
auth.username=test
auth.password=test
auth.token=dummytoken

